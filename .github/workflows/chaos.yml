name: HydraStream Chaos Engineering

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  chaos-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TEST_URL: "https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/000/001/405/GCF_000001405.40_GRCh38.p14/GCF_000001405.40_GRCh38.p14_cds_from_genomic.fna.gz"

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 🐍 Set up Python 3.11
        run: uv python install 3.11

      - name: 📦 Install HydraStream globally
        run: uv tool install .

      - name: 🌪️ Test 1 - Flaky Network (10% Packet Loss, 200ms Delay)
        run: |
          echo "Injecting 10% packet loss and 200ms latency..."
          sudo tc qdisc add dev eth0 root netem loss 10% delay 200ms

          hs "$TEST_URL" --stream -q > /dev/null

          echo "Restoring network..."
          sudo tc qdisc del dev eth0 root
          echo "✅ Flaky Network Test Passed!"

      - name: ✂️ Test 2 - Total Internet Outage & Recovery
        run: |

          sudo tc qdisc add dev eth0 root tbf rate 10mbit burst 32k latency 400ms

          hs "$TEST_URL" --stream -q > /dev/null &
          PID=$!

          sleep 3

          echo "🚫 CUTTING INTERNET OFF..."
          sudo iptables -A OUTPUT -p tcp --dport 443 -j DROP

          sleep 15

          echo "🌐 RESTORING INTERNET..."
          sudo iptables -D OUTPUT -p tcp --dport 443 -j DROP

          wait $PID

          sudo tc qdisc del dev eth0 root
          echo "✅ Outage Recovery Test Passed!"

      - name: 💤 Test 3 - Process Suspend (SIGSTOP / SIGCONT)
        run: |
          hs "$TEST_URL" --stream -q > /dev/null &
          PID=$!

          sleep 2

          echo "🧊 FREEZING PROCESS (SIGSTOP)..."
          kill -STOP $PID

          sleep 10

          echo "🔥 WAKING UP PROCESS (SIGCONT)..."
          kill -CONT $PID

          wait $PID
          echo "✅ Sleep/Resume Test Passed!"
